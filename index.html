<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>SketchPad</title>
    <link rel="icon" href="favicon.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="/assets/gurapp/api/gurasuraisu-api.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--background-color-tr);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .actionbar {
            display: flex;
            gap: 10px;
            padding: 15px 200px 15px 25px;
            background-color: transparent;
            border-bottom: 1px solid var(--glass-border);
            border-radius: 0;
            flex-wrap: wrap;
            min-height: 80px;
        }

        .tool-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .tool-btn {
            background-color: var(--search-background);
            color: var(--text-color);
            border: 1px solid var(--glass-border);
            border-radius: 50%;
            cursor: pointer;
            height: 40px;
            aspect-ratio: 1 / 1;
            box-shadow: var(--sun-shadow);
            transition: background-color 0.2s;
            backdrop-filter: var(--edge-refraction-filter) saturate(2) blur(2.5px);
        }
        
        .tool-btn .material-symbols-rounded {
            font-size: 20px;
        }

        .tool-btn.active {
            background-color: var(--accent);
            color: var(--background-color);
            border-radius: 35px;
            corner-shape: superellipse(1.5);
        }

        .tool-btn:disabled {
            background-color: var(--overlay-color);
            cursor: not-allowed;
            opacity: 0.5;
        }

        input[type="color"] {
            width: 40px !important;
            height: 40px !important;
        }

        .size-slider {
            height: 40px !important;
            padding: 0 12px !important;
        }

        .canvas-container {
            flex-grow: 1;
            position: relative;
            border: none;
            border-radius: 0;
            overflow: hidden;
            background-color: white;
            border-radius: 15px;
            corner-shape: superellipse(1.5);
            margin-bottom: 25px;
        }
        
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            cursor: crosshair;
        }
        
        #tempCanvas {
            z-index: 1;  /* Make sure temp canvas is on top */
        }
    </style>
</head>
<body>
    <div class="actionbar">
        <div class="tool-group">
            <button class="tool-btn active" data-tool="brush"><span class="material-symbols-rounded">ink_pen</span></button>
            <button class="tool-btn" data-tool="eraser"><span class="material-symbols-rounded">ink_eraser</span></button>
        </div>
        <div class="tool-group">
            <button class="tool-btn" data-tool="line"><span class="material-symbols-rounded">horizontal_rule</span></button>
            <button class="tool-btn" data-tool="rectangle"><span class="material-symbols-rounded">square</span></button>
            <button class="tool-btn" data-tool="circle"><span class="material-symbols-rounded">circle</span></button>
        </div>
        <div class="tool-group">
            <input type="color" class="color-picker" id="colorPicker" value="#000000">
            <input type="range" class="size-slider" id="sizeSlider" min="1" max="50" value="5">
        </div>
        <div class="tool-group">
            <button class="tool-btn" id="undoBtn" disabled><span class="material-symbols-rounded">undo</span></button>
            <button class="tool-btn" id="redoBtn" disabled><span class="material-symbols-rounded">redo</span></button>
        </div>
        <div class="tool-group">
            <button class="tool-btn" id="clearBtn"><span class="material-symbols-rounded">refresh</span></button>
            <button class="tool-btn" id="saveBtn"><span class="material-symbols-rounded">arrow_circle_down</span></button>
        </div>
    </div>

    <div class="canvas-container">
        <canvas id="canvas"></canvas>
        <canvas id="tempCanvas"></canvas>
    </div>

    <script>
        // Canvas setup
        const canvas = document.getElementById('canvas');
        const tempCanvas = document.getElementById('tempCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const tempCtx = tempCanvas.getContext('2d', { willReadFrequently: true });
        
        // UI elements
        const toolBtns = document.querySelectorAll('[data-tool]');
        const colorPicker = document.getElementById('colorPicker');
        const sizeSlider = document.getElementById('sizeSlider');
        const clearBtn = document.getElementById('clearBtn');
        const saveBtn = document.getElementById('saveBtn');
        const undoBtn = document.getElementById('undoBtn');
        const redoBtn = document.getElementById('redoBtn');
        
        // State variables
        let isDrawing = false;
        let currentTool = 'brush';
        let lastX = 0;
        let lastY = 0;
        let startX = 0;
        let startY = 0;
        let undoStack = [];
        let redoStack = [];
        
        function resizeCanvas() {
            const container = canvas.parentElement;
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            tempCanvas.width = container.clientWidth;
            tempCanvas.height = container.clientHeight;
            
            // Set initial white background
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            if (undoStack.length === 0) {
                saveState();
            }
        }
        
        function draw(e) {
            if (!isDrawing) return;
        
            const rect = tempCanvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
        
            tempCtx.clearRect(0, 0, tempCanvas.width, tempCanvas.height);
        
            if (currentTool === 'brush' || currentTool === 'eraser') {
                ctx.beginPath();
                ctx.strokeStyle = currentTool === 'eraser' ? 'white' : colorPicker.value;
                ctx.lineWidth = sizeSlider.value;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.moveTo(lastX, lastY);
                ctx.lineTo(x, y);
                ctx.stroke();
                [lastX, lastY] = [x, y];
            } else {
                tempCtx.beginPath();
                tempCtx.strokeStyle = colorPicker.value;
                tempCtx.lineWidth = sizeSlider.value;
                tempCtx.lineCap = 'round';
                tempCtx.lineJoin = 'round';
        
                switch (currentTool) {
                    case 'line':
                        tempCtx.moveTo(startX, startY);
                        tempCtx.lineTo(x, y);
                        break;
                    case 'rectangle':
                        const width = x - startX;
                        const height = y - startY;
                        tempCtx.strokeRect(startX, startY, width, height);
                        break;
                    case 'circle':
                        const radius = Math.sqrt(Math.pow(x - startX, 2) + Math.pow(y - startY, 2));
                        tempCtx.arc(startX, startY, radius, 0, Math.PI * 2);
                        break;
                }
                tempCtx.stroke();
            }
        }
        
        function startDrawing(e) {
            isDrawing = true;
            const rect = tempCanvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            [lastX, lastY] = [x, y];
            [startX, startY] = [x, y];
        }
        
        function stopDrawing() {
            if (!isDrawing) return;
            isDrawing = false;
        
            if (currentTool !== 'brush' && currentTool !== 'eraser') {
                ctx.drawImage(tempCanvas, 0, 0);
                tempCtx.clearRect(0, 0, tempCanvas.width, tempCanvas.height);
            }
            saveState();
        }
        
        function saveState() {
            undoStack.push(canvas.toDataURL());
            redoStack = [];
            updateUndoRedoButtons();
        }
        
        function updateUndoRedoButtons() {
            undoBtn.disabled = undoStack.length <= 1;
            redoBtn.disabled = redoStack.length === 0;
        }
        
        function undo() {
            if (undoStack.length <= 1) return;
            redoStack.push(undoStack.pop());
            loadState(undoStack[undoStack.length - 1]);
        }
        
        function redo() {
            if (redoStack.length === 0) return;
            const state = redoStack.pop();
            undoStack.push(state);
            loadState(state);
        }
        
        function loadState(state) {
            const img = new Image();
            img.src = state;
            img.onload = () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(img, 0, 0);
                updateUndoRedoButtons();
            };
        }
        
        function clearCanvas() {
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            tempCtx.clearRect(0, 0, tempCanvas.width, tempCanvas.height);
            saveState();
        }
        
        // Event Listeners
        window.addEventListener('resize', resizeCanvas);
        tempCanvas.addEventListener('mousedown', startDrawing);
        tempCanvas.addEventListener('mousemove', draw);
        tempCanvas.addEventListener('mouseup', stopDrawing);
        tempCanvas.addEventListener('mouseout', stopDrawing);
        
        toolBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                toolBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentTool = btn.dataset.tool;
            });
        });
        
        clearBtn.addEventListener('click', clearCanvas);
        saveBtn.addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = 'sketch.png';
            link.href = canvas.toDataURL();
            link.click();
        });
        undoBtn.addEventListener('click', undo);
        redoBtn.addEventListener('click', redo);
        
        // Initialize
        resizeCanvas();
    </script>
</body>
</html>
